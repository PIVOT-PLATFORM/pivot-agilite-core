spring:
  application:
    name: pivot-agilite-backend

  # datasource URL/username/password are injected by @ServiceConnection (Testcontainers).

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    # See application.yml for why there is no blanket hibernate.default_schema here (US20.1.1 —
    # first consumer of fr.pivot.core.team.Team/TeamMember, whose @Table has no explicit schema).

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    schemas: agilite
    default-schema: agilite

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /api/agilite

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    fr.pivot: DEBUG
    org.springframework.web: DEBUG
    org.flywaydb: INFO

pivot:
  activemq:
    # See WebSocketConfig#configureMessageBroker JavaDoc (EN09.1) — an unreachable EN07.3 relay
    # target is unsafe to leave enabled alongside the new poker room SimpleBroker in tests that
    # provide no real ActiveMQ broker. WebSocketConfigIT (EN07.3, real ActiveMQ Testcontainer)
    # overrides this back to true via @DynamicPropertySource.
    relay-enabled: false
