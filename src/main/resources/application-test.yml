spring:
  application:
    name: pivot-agilite-backend

  # datasource URL/username/password are injected by @ServiceConnection (Testcontainers).

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: agilite

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    schemas: agilite
    default-schema: agilite

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /api/agilite

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    fr.pivot: DEBUG
    org.springframework.web: DEBUG
    org.flywaydb: INFO
