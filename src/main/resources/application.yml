spring:
  application:
    name: pivot-agilite-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pivot}
    username: ${SPRING_DATASOURCE_USERNAME:pivot}
    password: ${SPRING_DATASOURCE_PASSWORD:pivot}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    # US20.1.1: no blanket hibernate.default_schema here (deliberately removed) — this repo now
    # imports fr.pivot.core.team.Team/TeamMember from pivot-core-starter, whose @Table has no
    # explicit schema attribute; a global default_schema: agilite would silently misdirect their
    # queries to agilite.teams/agilite.team_members (which don't exist) instead of
    # public.teams/public.team_members. Every entity this repo owns declares its schema
    # explicitly instead (@Table(schema = "agilite") for RetroSession, @Table(schema = "public")
    # for the read-only PlatformAccessToken/PlatformUser/PlatformTenant mirrors), so Team/
    # TeamMember's unqualified table names fall back to Postgres's own default search_path
    # ("$user", public) and resolve correctly without any starter-side change. First consumer of
    # Team/TeamMember across all pivot-xxx-core repos — no established convention existed yet.

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    schemas: agilite
    default-schema: agilite

  data:
    redis:
      # Valeurs par défaut : overridées via SPRING_DATA_REDIS_HOST / SPRING_DATA_REDIS_PORT
      # par le relaxed binding Spring Boot (Spring Boot 4.x, pas de placeholder ${...} nécessaire).
      host: localhost
      port: 6379

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /api/agilite

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    fr.pivot: ${LOG_LEVEL_PIVOT:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:WARN}
    org.flywaydb: ${LOG_LEVEL_FLYWAY:WARN}

pivot:
  activemq:
    # EN07.3 — shared ActiveMQ broker (KahaDB persistence, DLQ.agilite), owned/configured by
    # pivot-core. Default host/port match its Docker Compose service (dev + prod) — see
    # WebSocketConfig for the relay itself. relay-enabled is overridden to false in
    # application-test.yml — see WebSocketConfig#configureMessageBroker JavaDoc (EN09.1: a
    # second, simultaneous SimpleBroker registration for poker room traffic makes an
    # unreachable relay target unsafe to leave enabled in tests that don't provide a real
    # broker).
    relay-enabled: ${PIVOT_ACTIVEMQ_RELAY_ENABLED:true}
    relay-host: ${PIVOT_ACTIVEMQ_RELAY_HOST:activemq}
    relay-port: ${PIVOT_ACTIVEMQ_RELAY_PORT:61613}
  cors:
    # WebSocket handshake origin (EN07.3 WebSocketConfig) + REST controllers (US20.1.1, US09.1.1).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  agilite:
    poker:
      room:
        # US09.1.1 — default room lifetime when the caller omits `expirationHours` in
        # POST /api/agilite/poker/rooms (ADR-026 §2 : "expiration configurable, 24h par défaut").
        default-expiration-hours: ${PIVOT_POKER_ROOM_DEFAULT_EXPIRATION_HOURS:24}
    retro:
      phase-scheduler:
        # US20.1.2a — poll interval for RetroPhaseScheduler's CONTRIBUTION timer-expiry check.
        # Overridden to a much shorter value in application-test.yml for faster IT feedback.
        fixed-delay-ms: ${PIVOT_RETRO_PHASE_SCHEDULER_FIXED_DELAY_MS:2000}
