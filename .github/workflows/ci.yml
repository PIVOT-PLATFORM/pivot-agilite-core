name: CI

# Stub — délègue au reusable workflow d'org pivot-cicd (source unique, EN05.17/US05.17.2).
# Voir PIVOT-PLATFORM/pivot-cicd/.github/workflows/ci-core.yml + docs/USAGE.md.
# Réf épinglée par SHA (gate Plumber actionsMustBePinnedByCommitSha) ; Dependabot
# (github-actions) bumpe ce SHA à chaque release de pivot-cicd.
# Secrets passés explicitement (secrets: inherit interdit par Plumber).

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

# Plafond de permissions accordé au reusable (il ne peut pas le dépasser — sinon startup_failure).
permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ci:
    # Repo -core (Java) : les défauts du reusable conviennent (java 25, release 24, redis).
    uses: PIVOT-PLATFORM/pivot-cicd/.github/workflows/ci-core.yml@d7a9ac81d59102d5dc205c4902fba770a2a8b2e5 # pivot-cicd main (EN05.17)
    with:
      sonar-project-key: PIVOT-PLATFORM_pivot-agilite-core
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
