name: Security

# Stub — délègue au reusable workflow d'org (source unique).
# Voir PIVOT-PLATFORM/.github/.github/workflows/security.yml
#
# Réf épinglée par SHA (contrôle Plumber actionsMustBePinnedByCommitSha) sur le commit de
# merge de .github#13 sur main (6fd747d, squash de la Vague 1) — le pilote a été validé
# vert de bout en bout sur les SHA de branche avant merge.
# Rappel du piège corrigé pendant le pilote : un reusable déclarant au niveau workflow des
# permissions au-delà du plafond accordé ci-dessous par ce stub provoque un startup_failure
# ("workflow is requesting ..., but is only allowed ..."). Le reusable déclare le même
# plafond minimal (contents/actions: read, security-events: write) que ce stub accorde.
# Secrets passés explicitement (pas de `secrets: inherit` — interdit par le contrôle Plumber
# reusableWorkflowsMustNotInheritSecrets).

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Lundi 6h UTC

# Plafond de permissions de l'appelant : un reusable ne peut pas *dépasser* ce que l'appelant
# accorde. Union exacte requise par les jobs du reusable (gitleaks/codeql/semgrep/plumber).
permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  security:
    uses: PIVOT-PLATFORM/.github/.github/workflows/security.yml@6fd747da27199b4db05e6067fdb24ad6fbb8baea # main (Vague 1, .github#13)
    # Repo -core (Java) : les défauts du reusable conviennent
    # (codeql-language=java, build Maven, semgrep Java/Spring, paths src/main/java src/test/java).
    # Aucun input à surcharger.
    secrets:
      GITLEAKS_LICENCE_KEY: ${{ secrets.GITLEAKS_LICENCE_KEY }}
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      PLUMBER_METADATA_TOKEN: ${{ secrets.PLUMBER_METADATA_TOKEN }}
      PLUMBER_TOKEN: ${{ secrets.PLUMBER_TOKEN }}
