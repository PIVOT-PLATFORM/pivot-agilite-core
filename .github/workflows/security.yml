name: Security

# Stub — délègue au reusable workflow d'org (source unique).
# Voir PIVOT-PLATFORM/.github/.github/workflows/security.yml
#
# Réf épinglée par SHA (contrôle Plumber actionsMustBePinnedByCommitSha). Ce SHA pointe la
# branche chore/reusable-security-workflow (.github#13) pour valider le pilote avant merge ;
# à re-pinner sur le SHA de main une fois #13 mergée.
# Secrets passés explicitement (pas de `secrets: inherit` — interdit par le contrôle Plumber
# reusableWorkflowsMustNotInheritSecrets).

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Lundi 6h UTC

# Plafond de permissions de l'appelant : un reusable ne peut pas *dépasser* ce que l'appelant
# accorde. Union exacte requise par les jobs du reusable (gitleaks/codeql/semgrep/plumber).
permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  security:
    uses: PIVOT-PLATFORM/.github/.github/workflows/security.yml@6bad31429a8baeb0b0578639713e09304ded905b
    # Repo -core (Java) : les défauts du reusable conviennent
    # (codeql-language=java, build Maven, semgrep Java/Spring, paths src/main/java src/test/java).
    # Aucun input à surcharger.
    secrets:
      GITLEAKS_LICENCE_KEY: ${{ secrets.GITLEAKS_LICENCE_KEY }}
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      PLUMBER_METADATA_TOKEN: ${{ secrets.PLUMBER_METADATA_TOKEN }}
      PLUMBER_TOKEN: ${{ secrets.PLUMBER_TOKEN }}
