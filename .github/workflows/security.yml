name: Security

# Stub — délègue au reusable workflow d'org (source unique).
# Voir PIVOT-PLATFORM/.github/.github/workflows/security.yml
#
# NB : @v1 doit exister côté repo .github (tag mobile). Avant la première release du reusable,
# référencer temporairement @main. Pinning strict (SHA) recommandé une fois stabilisé.

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Lundi 6h UTC

permissions: read-all

jobs:
  security:
    uses: PIVOT-PLATFORM/.github/.github/workflows/security.yml@v1
    secrets: inherit
